# gobackend.vulebaolong.com → http://go-backend:3069
server {
    listen 80;
    listen [::]:80;
    server_name gobackend.vulebaolong.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name gobackend.vulebaolong.com;
    
    ssl_certificate /etc/nginx/certs/vulebaolong_ssl_certificate.pem; 
    ssl_certificate_key /etc/nginx/certs/vulebaolong_ssl_certificate_key.pem;

    location / {
        proxy_pass http://go-backend:3069;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600;
    }
}